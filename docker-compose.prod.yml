# Irerero — Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: irerero_db
      POSTGRES_USER: irerero
      POSTGRES_PASSWORD: ${DB_PASSWORD:-irerero2025}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: irerero_db
      DB_USER: irerero
      DB_PASSWORD: ${DB_PASSWORD:-irerero2025}
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      DJANGO_DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  celery-worker:
    build: ./backend
    command: celery -A irerero_backend worker -l info --pool=threads --concurrency=4
    env_file: ./backend/.env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: irerero_db
      DB_USER: irerero
      DB_PASSWORD: ${DB_PASSWORD:-irerero2025}
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  celery-beat:
    build: ./backend
    command: celery -A irerero_backend beat -l info
    env_file: ./backend/.env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: irerero_db
      DB_USER: irerero
      DB_PASSWORD: ${DB_PASSWORD:-irerero2025}
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
